name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/api.txt -r requirements/worker.txt -r requirements/test.txt

      - name: Run tests
        env:
          DATABASE_URL: ""
          REDIS_URL: ""
          PUBLIC_BASE_URL: "https://tlsaudit.ru"
          MONITORING_TOKEN_SECRET: "ci-monitoring-token-secret"
          MONITORING_ADMIN_TOKEN: "ci-monitoring-admin-token"
        run: python -m unittest discover -q
